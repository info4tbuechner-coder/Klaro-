
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Klaro" />
  <meta name="theme-color" content="#020617" />
  <meta name="format-detection" content="telephone=no" />
  
  <!-- Manifest & Icons -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/bot.png" />
  
  <title>Klaro | Financial Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --background-start: 222 47% 2%;
      --background-end: 222 47% 0%;
      --foreground: 210 40% 98%;
      --card: 222 47% 4%;
      --primary: 190 100% 50%;
      --secondary: 222 47% 8%;
      --muted: 222 47% 12%;
      --muted-foreground: 215 20% 65%;
      --border: 222 47% 15%;
      --blob-1: 260 80% 20%;
      --blob-2: 220 80% 20%;
    }

    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      background-color: hsl(var(--background-start));
      color: hsl(var(--foreground));
      min-height: 100vh;
      min-height: 100dvh;
      transition: background-color 0.8s ease;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .glass-card {
      background: hsl(var(--card) / 0.7);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid hsl(var(--foreground) / 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    .blob-container {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      filter: blur(140px);
      opacity: 0.45;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      width: 70vw;
      height: 70vw;
      border-radius: 50%;
      background: hsl(var(--blob-1));
      animation: drift 30s infinite alternate ease-in-out;
    }

    .blob-2 {
      background: hsl(var(--blob-2));
      width: 60vw;
      height: 60vw;
      right: -10vw;
      bottom: -10vw;
      animation-duration: 40s;
    }

    @keyframes drift {
      from { transform: translate(-10%, -10%) rotate(0deg); }
      to { transform: translate(20%, 20%) rotate(180deg); }
    }

    input, select, textarea { 
        font-size: 16px !important; 
        user-select: text !important;
        -webkit-user-select: text !important;
        -webkit-touch-callout: default;
    } 

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    button:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .shimmer {
      background: linear-gradient(90deg, 
        rgba(255,255,255,0.03) 25%, 
        rgba(255,255,255,0.08) 50%, 
        rgba(255,255,255,0.03) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }

    .modal-open {
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    /* Pull to refresh prevention */
    html {
        overscroll-behavior-y: contain;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.542.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.1.2",
    "date-fns/": "https://esm.sh/date-fns@^4.1.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased">
  <div class="blob-container">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
