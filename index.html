
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Klaro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    
    /* Modernized Themes with richer colors and colored shadows */
    .theme-grandeur {
      --background-start: 210 40% 98%;
      --background-end: 210 40% 95%;
      --foreground: 222 47% 11%;
      --card: 0 0% 100%;
      --card-foreground: 222 47% 11%;
      --popover: 0 0% 100%;
      --popover-foreground: 222 47% 11%;
      --primary: 221 83% 53%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222 47% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222 47% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 221 83% 53%;
      --radius: 1.25rem;
      --success: 150 100% 36%;
      --warning: 38 92% 50%;
      --shadow-color: 221 83% 40%;
    }

    .theme-neon {
      --background-start: 240 20% 3%;
      --background-end: 240 20% 2%;
      --foreground: 0 0% 100%;
      --card: 240 20% 5%;
      --card-foreground: 0 0% 100%;
      --popover: 240 20% 5%;
      --popover-foreground: 0 0% 100%;
      --primary: 270 100% 60%;
      --primary-foreground: 0 0% 100%;
      --secondary: 240 10% 12%;
      --secondary-foreground: 0 0% 100%;
      --muted: 240 10% 12%;
      --muted-foreground: 240 10% 60%;
      --accent: 290 100% 50%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 100% 60%;
      --destructive-foreground: 0 0% 100%;
      --border: 240 10% 15%;
      --input: 240 10% 15%;
      --ring: 270 100% 60%;
      --radius: 1.5rem;
      --success: 120 100% 50%;
      --warning: 60 100% 50%;
      --shadow-color: 270 100% 40%;
    }

    /* Premium Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      background-color: hsl(var(--card) / 0.75);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid hsl(var(--foreground) / 0.08);
      box-shadow: 
        0 10px 15px -3px rgba(0, 0, 0, 0.1),
        0 4px 6px -2px rgba(0, 0, 0, 0.05),
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.05);
    }
    
    .dark .glass-card {
        background-color: hsl(var(--card) / 0.5);
        border: 1px solid hsl(var(--foreground) / 0.1);
        box-shadow: 0 20px 50px -12px rgba(0,0,0,0.5);
    }

    /* Noise Texture Overlay */
    body::before {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        content: "";
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
        opacity: 0.4;
        mix-blend-mode: overlay;
    }

    /* Animation Utilities */
    .animate-in-fade {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .font-mono {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
    }

    ::-webkit-scrollbar {
        width: 6px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: hsl(var(--muted-foreground) / 0.2);
        border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: hsl(var(--muted-foreground) / 0.4);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0",
    "date-fns/": "https://aistudiocdn.com/date-fns@^4.1.0/",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.542.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.1.2"
  }
}
</script>
</head>
<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
